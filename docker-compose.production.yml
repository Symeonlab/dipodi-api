# ──────────────────────────────────────────
# Dipoddi API — Production (Sliplane)
# ──────────────────────────────────────────
# NOTE: On Sliplane, each service is deployed separately.
# This file is for reference / self-hosted production only.
#
# Sliplane setup:
#   Service 1: dipodi-api    (Dockerfile in root)
#   Service 2: dipodi-mysql  (docker/mysql/Dockerfile)
#
# Usage (self-hosted):
#   docker compose -f docker-compose.yml -f docker-compose.production.yml up -d
# ──────────────────────────────────────────

services:
  # Laravel PHP Application (single container)
  app:
    restart: always
    ports:
      - "80:80"
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      APP_URL: https://dipodi-api.sliplane.app
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: dipodi_api
      DB_USERNAME: dipodi
      DB_PASSWORD: ${DB_PASSWORD}
      DIPODI_APP_KEY_HASH: ${DIPODI_APP_KEY_HASH}

  # MySQL Database — port NOT exposed in production
  mysql:
    restart: always
    ports: []
    environment:
      MYSQL_DATABASE: dipodi_api
      MYSQL_USER: dipodi
      MYSQL_PASSWORD: ${DB_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
    security_opt:
      - no-new-privileges:true
