# Production overrides for docker-compose.yml
# Usage: docker compose -f docker-compose.yml -f docker-compose.production.yml up -d

services:
  # Laravel PHP Application
  app:
    restart: always
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  # Nginx Web Server
  nginx:
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./:/var/www
      - ./docker/nginx/production.conf:/etc/nginx/conf.d/default.conf:ro
      - ssl-certs:/etc/nginx/ssl:ro

  # MySQL Database — port NOT exposed in production
  mysql:
    restart: always
    ports: []

  # Redis cache and queue backend
  redis:
    image: redis:7-alpine
    container_name: dipodi-redis
    restart: always
    networks:
      - dipodi-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  # Laravel queue worker
  queue:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dipodi-queue
    restart: always
    command: php artisan queue:work redis --sleep=3 --tries=3 --max-time=3600
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/production.ini:/usr/local/etc/php/conf.d/production.ini
    networks:
      - dipodi-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

  # Laravel scheduler (runs php artisan schedule:run every minute)
  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: dipodi-scheduler
    restart: always
    command: >
      sh -c "while true; do php artisan schedule:run --verbose --no-interaction; sleep 60; done"
    working_dir: /var/www
    volumes:
      - ./:/var/www
      - ./docker/php/production.ini:/usr/local/etc/php/conf.d/production.ini
    networks:
      - dipodi-network
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      APP_ENV: production
      APP_DEBUG: "false"

volumes:
  ssl-certs:
    driver: local
