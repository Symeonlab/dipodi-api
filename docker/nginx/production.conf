# Rate limiting zone — 10MB shared memory, 30 requests/second per IP
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/s;

# PHP-FPM upstream
upstream php-fpm {
    server app:9000;
    keepalive 16;
}

# Redirect all HTTP to HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name api.dipodi.com;

    # Allow Let's Encrypt ACME challenges through before the redirect
    location /.well-known/acme-challenge/ {
        root /var/www/public;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# HTTPS server
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name api.dipodi.com;

    root /var/www/public;
    index index.php;
    charset utf-8;

    # SSL certificates
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Modern SSL configuration
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Hide Nginx version
    server_tokens off;

    # Logging
    access_log /var/log/nginx/api.dipodi.com.access.log combined buffer=512k flush=5m;
    error_log  /var/log/nginx/api.dipodi.com.error.log warn;

    # Upload limit — appropriate for an API (profile images, documents)
    client_max_body_size 20M;

    # Security headers
    add_header X-Frame-Options              "DENY"                                                                    always;
    add_header X-Content-Type-Options       "nosniff"                                                                 always;
    add_header X-XSS-Protection            "1; mode=block"                                                           always;
    add_header Strict-Transport-Security    "max-age=31536000; includeSubDomains"                                     always;
    add_header Referrer-Policy              "strict-origin-when-cross-origin"                                         always;
    add_header Permissions-Policy           "camera=(), microphone=(), geolocation=()"                                always;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 256;
    gzip_types
        text/plain
        text/css
        text/xml
        text/javascript
        application/json
        application/javascript
        application/xml
        application/rss+xml
        application/atom+xml
        image/svg+xml
        font/woff
        font/woff2;

    # Health check — no auth, no logging, fast return
    location = /health {
        access_log off;
        add_header Content-Type text/plain;
        return 200 "OK\n";
    }

    # Block access to .env files
    location ~ /\.env {
        deny all;
        return 404;
    }

    # Block access to .git directory
    location ~ /\.git {
        deny all;
        return 404;
    }

    # Block direct access to the storage directory
    location ^~ /storage/ {
        deny all;
        return 404;
    }

    # Deny all other dotfiles/hidden files
    location ~ /\. {
        deny all;
        return 404;
    }

    # API routes — apply rate limiting
    location /api/ {
        limit_req zone=api burst=60 nodelay;
        limit_req_status 429;

        try_files $uri $uri/ /index.php?$query_string;
    }

    # Static assets — 30-day cache
    location ~* \.(jpg|jpeg|png|gif|ico|webp|svg|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        access_log off;
        add_header Cache-Control "public, immutable";
    }

    # All other Laravel routes
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # PHP-FPM handler
    location ~ \.php$ {
        fastcgi_pass   php-fpm;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include        fastcgi_params;

        fastcgi_read_timeout    300s;
        fastcgi_send_timeout    300s;
        fastcgi_connect_timeout 300s;

        fastcgi_buffer_size          128k;
        fastcgi_buffers              4 256k;
        fastcgi_busy_buffers_size    256k;

        fastcgi_hide_header X-Powered-By;
    }
}
