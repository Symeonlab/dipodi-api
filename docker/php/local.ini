; ============================================================
; LOCAL DEVELOPMENT ONLY — Do NOT use these settings in staging or production.
; display_errors is ON, memory limits are generous, and OPcache timestamp
; validation is enabled so code changes are picked up without restarting.
; For production settings see docker/php/production.ini
; ============================================================
; PHP Configuration for Dipoddi API
; Optimized for Laravel local development

[PHP]
; Error handling
display_errors = On
display_startup_errors = On
error_reporting = E_ALL
log_errors = On

; Memory and execution
memory_limit = 512M
max_execution_time = 300
max_input_time = 300

; File uploads
upload_max_filesize = 100M
post_max_size = 100M
max_file_uploads = 20

; Session
session.gc_maxlifetime = 7200

; OPcache settings for better performance
[opcache]
opcache.enable = 1
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1
opcache.save_comments = 1
opcache.fast_shutdown = 1

; Date/Time
date.timezone = UTC
