[PHP]
; Error display — never expose errors to end users in production
display_errors = Off
display_startup_errors = Off
log_errors = On
error_log = /var/log/php/error.log
error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT

; Memory and execution limits
memory_limit = 256M
max_execution_time = 60
max_input_time = 60

; Upload limits — kept in sync with Nginx client_max_body_size
upload_max_filesize = 20M
post_max_size = 25M
max_file_uploads = 10

; Security — never reveal PHP version in HTTP headers or phpinfo
expose_php = Off

; Session hardening
session.cookie_httponly = 1
session.cookie_secure = 1
session.use_strict_mode = 1
session.cookie_samesite = Lax
session.gc_maxlifetime = 7200

[opcache]
; Enable OPcache for compiled bytecode caching
opcache.enable = 1
opcache.enable_cli = 0

; Disable timestamp validation — source files never change without a deployment
opcache.validate_timestamps = 0
opcache.revalidate_freq = 0

; Memory allocation for the compiled opcode cache
opcache.memory_consumption = 256
opcache.interned_strings_buffer = 16

; Large enough for a typical Laravel application and its vendor dependencies
opcache.max_accelerated_files = 20000

opcache.save_comments = 1
opcache.fast_shutdown = 1
