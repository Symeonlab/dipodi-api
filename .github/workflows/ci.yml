name: CI — Backend API

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ──────────────────────────────────────────────
  # 1. Code Quality — Linting & Static Analysis
  # ──────────────────────────────────────────────
  lint:
    name: Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, xml, zip, intl, bcmath, gd
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ hashFiles('composer.lock') }}
          restore-keys: composer-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Run Laravel Pint (code style)
        run: vendor/bin/pint --test

  # ──────────────────────────────────────────────
  # 2. Tests — PHPUnit with MySQL
  # ──────────────────────────────────────────────
  test:
    name: Tests (PHP ${{ matrix.php }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      matrix:
        php: ['8.2', '8.3']

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: testing
          MYSQL_DATABASE: testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h localhost"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: mbstring, xml, zip, intl, bcmath, gd, pdo_mysql, redis
          coverage: xdebug
          tools: composer:v2

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: vendor
          key: composer-${{ matrix.php }}-${{ hashFiles('composer.lock') }}
          restore-keys: composer-${{ matrix.php }}-

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Prepare environment
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/DB_HOST=mysql/DB_HOST=127.0.0.1/' .env
          sed -i 's/DB_USERNAME=sail/DB_USERNAME=root/' .env
          sed -i 's/DB_PASSWORD=password/DB_PASSWORD=testing/' .env
          sed -i 's/DB_DATABASE=dipodi_api/DB_DATABASE=testing/' .env

      - name: Run migrations
        run: php artisan migrate --force --no-interaction

      - name: Run PHPUnit tests
        run: php artisan test --parallel --no-interaction
        env:
          DB_HOST: 127.0.0.1
          DB_DATABASE: testing
          DB_USERNAME: root
          DB_PASSWORD: testing

  # ──────────────────────────────────────────────
  # 3. Security — Dependency Audit
  # ──────────────────────────────────────────────
  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          tools: composer:v2

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --no-progress

      - name: Check for known vulnerabilities
        run: composer audit

  # ──────────────────────────────────────────────
  # 4. Build — Docker Build Verification
  # ──────────────────────────────────────────────
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, security]

    steps:
      - uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t dipoddi-api:ci .

      - name: Verify container starts
        run: |
          docker run -d --name dipoddi-test \
            -e APP_KEY=base64:testkeytestkeytestkeytestkeytes0= \
            -e APP_ENV=testing \
            -e DB_CONNECTION=sqlite \
            -e DB_DATABASE=:memory: \
            -p 8080:80 \
            dipoddi-api:ci

          # Wait for container to be ready
          for i in $(seq 1 30); do
            if curl -s http://localhost:8080/health | grep -q '"status":"ok"'; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "Waiting for container... ($i/30)"
            sleep 2
          done

          echo "❌ Health check failed"
          docker logs dipoddi-test
          exit 1

      - name: Cleanup
        if: always()
        run: docker rm -f dipoddi-test 2>/dev/null || true
